<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    // Apply the saved theme before the first paint to avoid a light flash
    (function () {
      try {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Puzzle Trainer</title>
  <!-- Linking our custom CSS file -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <!-- Google Fonts for a premium look -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Chessground (lichess board) CSS: board frame, brown theme, cburnett pieces -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@lichess-org/chessground@10.1.1/assets/chessground.base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@lichess-org/chessground@10.1.1/assets/chessground.brown.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@lichess-org/chessground@10.1.1/assets/chessground.cburnett.css">
</head>

<body>
  <header class="main-header">
    <div class="logo">
      <i class="fas fa-chess-knight"></i> PuzzleTrainer
    </div>
    <nav>
      {% if user %}
      <span class="user-info">Welcome, {{ user.username }}</span>
      <a href="{{ url_for('stats') }}" class="btn btn-secondary">
        <i class="fas fa-chart-bar"></i> Stats
      </a>
      <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
      {% else %}
      <a href="{{ url_for('login') }}" class="btn btn-lichess">
        <svg class="lichess-logo" viewBox="0 0 50 50" width="18" height="18">
          <path fill="currentColor" d="M11.25 0A11.25 11.25 0 000 11.25v27.5A11.25 11.25 0 0011.25 50h27.5A11.25 11.25 0 0050 38.75v-27.5A11.25 11.25 0 0038.75 0h-27.5zm6.42 9.58a1.67 1.67 0 011.66 1.67v5.42h5.42a1.67 1.67 0 010 3.33h-5.42v5.42a1.67 1.67 0 01-3.33 0V20h-5.42a1.67 1.67 0 010-3.33H16V11.25a1.67 1.67 0 011.67-1.67zm14.58 0a1.67 1.67 0 011.67 1.67v15.42a1.67 1.67 0 01-3.34 0V11.25a1.67 1.67 0 011.67-1.67zm0 20a1.67 1.67 0 011.67 1.67v5.42a1.67 1.67 0 01-3.34 0v-5.42a1.67 1.67 0 011.67-1.67z"/>
        </svg>
        Login with Lichess
      </a>
      {% endif %}
      <button id="theme-toggle" class="btn btn-secondary theme-toggle" aria-label="Toggle dark mode"
        title="Toggle dark mode">
        <i class="fas fa-moon"></i>
      </button>
    </nav>
  </header>

  <main class="container">
    <!-- This block is where child templates (like index.html) will inject their content -->
    {% block content %}{% endblock %}
  </main>

  <!-- jQuery for DOM plumbing -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Chessground ships as an ESM-only bundle; module scripts run before
       DOMContentLoaded, so the global is set before scripts.js needs it -->
  <script type="module">
    import { Chessground } from 'https://cdn.jsdelivr.net/npm/@lichess-org/chessground@10.1.1/dist/chessground.min.js';
    window.Chessground = Chessground;
  </script>
  <!-- chess.js for move validation and game logic -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>

</html>
