{% extends "base.html" %}

{% block content %}
  <h2>Here is your puzzle</h2>
  {% if puzzle %}
    <p><strong>ID:</strong> {{ puzzle.id }}</p>
    <p><strong>FEN:</strong> {{ puzzle.fen }}</p>
    <p><strong>Themes:</strong> {{ puzzle.themes }}</p>
    <p><strong>Rating:</strong> {{ puzzle.rating }}</p>

    <!-- 
      Just for demonstration, we’re showing the puzzle data in text form.
      Eventually, you can use a JS chessboard library to render the position visually.
    -->
  {% else %}
    <p>No puzzle found!</p>
  {% endif %}

  <hr/>
  <a href="{{ url_for('random_puzzle_view') }}">Get Another Puzzle</a>
{% endblock %}
